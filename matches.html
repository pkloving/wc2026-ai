<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-attr="title:matches.pageTitle">赛程 · 积分榜 · 比分 · WC 2026 · AI 预测</title>
  <meta name="description" data-i18n-attr="content:matches.pageSub" content="2026 美加墨世界杯的赛程时间表 / 小组积分表 / 已完赛比分表，单页切换。" />
  <meta name="theme-color" content="#0B1F3A" />
  <meta property="og:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    /* Segmented control (3 tabs) */
    .matches-tabs {
      display: flex; gap: 0;
      background: #11264A; border: 1px solid #1F3A5F; border-radius: 8px; padding: 4px;
      margin-bottom: 16px; max-width: 480px;
    }
    .matches-tab {
      flex: 1; padding: 8px 16px; border: none; background: transparent; cursor: pointer;
      color: #A0A8B8; font-size: 13px; font-weight: 600; border-radius: 5px;
      transition: background .15s, color .15s;
    }
    .matches-tab:hover { color: #E8E8E8; }
    .matches-tab.is-active { background: #D4AF37; color: #0B1F3A; }
    .matches-view { display: none; }
    .matches-view.is-active { display: block; }
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Matches</div>
      <h1 class="text-3xl sm:text-4xl font-black" data-i18n="matches.pageTitle">赛程 · 积分榜 · 比分</h1>
      <p class="text-slate-500 text-sm mt-2" data-i18n="matches.pageSub">2026 美加墨世界杯的赛程时间表 / 小组积分表 / 已完赛比分表，单页切换。</p>
    </div>

    <!-- 顶部 segmented control -->
    <div class="matches-tabs" role="tablist">
      <button class="matches-tab" data-tab="schedule" role="tab" data-i18n="matches.tab.schedule">赛程</button>
      <button class="matches-tab" data-tab="standings" role="tab" data-i18n="matches.tab.standings">积分榜</button>
      <button class="matches-tab" data-tab="results" role="tab" data-i18n="matches.tab.results">比分</button>
    </div>

    <!-- View 1: 赛程 (复用 schedule.js 期望的 DOM ID) -->
    <section class="matches-view" id="view-schedule" data-view="schedule">
      <div class="card p-4 mb-6">
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
          <div>
            <label class="text-xs text-slate-500 mb-1 block" data-i18n="schedule.filter.stage">阶段</label>
            <select id="f-stage" class="input">
              <option value="" data-i18n="common.all">全部</option>
              <option value="group" data-i18n="schedule.stage.group">小组赛</option>
              <option value="r32" data-i18n="schedule.stage.r32">32 强</option>
              <option value="r16" data-i18n="schedule.stage.r16">16 强</option>
              <option value="qf" data-i18n="schedule.stage.qf">8 强</option>
              <option value="sf" data-i18n="schedule.stage.sf">半决赛</option>
              <option value="third" data-i18n="schedule.stage.third">三四名</option>
              <option value="final" data-i18n="schedule.stage.final">决赛</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block" data-i18n="schedule.filter.group">小组</label>
            <select id="f-group" class="input">
              <option value="" data-i18n="common.all">全部</option>
              <option value="A">A</option><option value="B">B</option><option value="C">C</option>
              <option value="D">D</option><option value="E">E</option><option value="F">F</option>
              <option value="G">G</option><option value="H">H</option><option value="I">I</option>
              <option value="J">J</option><option value="K">K</option><option value="L">L</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block" data-i18n="schedule.filter.status">状态</label>
            <select id="f-status" class="input">
              <option value="" data-i18n="common.all">全部</option>
              <option value="finished" data-i18n="schedule.status.finished">已结束</option>
              <option value="scheduled" data-i18n="schedule.status.scheduled">未开赛</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block" data-i18n="schedule.filter.team">球队 (3 字母代码)</label>
            <input id="f-team" class="input" data-i18n-attr="placeholder:schedule.filter.teamPlaceholder" placeholder="如 ARG / BRA" />
          </div>
        </div>
        <div class="mt-3 flex items-center justify-between text-xs text-slate-500">
          <span id="f-count">—</span>
          <button id="f-reset" class="text-ink hover:text-gold" data-i18n="common.reset">重置</button>
        </div>
      </div>
      <div id="schedule-list" aria-busy="true">
        <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
        <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
        <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
      </div>
    </section>

    <!-- View 2: 积分榜 (复用 standings.js 期望的 DOM ID) -->
    <section class="matches-view" id="view-standings" data-view="standings">
      <div class="card p-3 mb-6 overflow-x-auto scrollbar-thin">
        <div id="group-tabs" class="flex gap-1 min-w-max" aria-busy="true">
          <div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div>
        </div>
      </div>
      <div id="standings-table" aria-busy="true">
        <div class="card p-8"><div class="sk h-4 w-1/3 mb-3"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-3/4"></div></div>
      </div>
      <div class="mt-10">
        <h2 class="text-xl font-bold mb-3" data-i18n="standings.thirds.title">8 个最佳第 3 名</h2>
        <p class="text-xs text-slate-500 mb-3" data-i18n="standings.thirds.subtitle">FIFA 规则：积分 → 净胜球 → 进球 → 公平竞赛分</p>
        <div id="third-place-table" aria-busy="true">
          <div class="card p-8"><div class="sk h-4 w-1/2 mb-3"></div><div class="sk h-4 w-full mb-2"></div></div>
        </div>
      </div>
    </section>

    <!-- View 3: 比分 (复用 results.js 期望的 DOM ID) -->
    <section class="matches-view" id="view-results" data-view="results">
      <div id="results-list" class="grid lg:grid-cols-2 gap-4" aria-busy="true">
        <div class="card p-5"><div class="sk h-3 w-20 mb-2"></div><div class="sk h-6 w-full mb-1"></div><div class="sk h-6 w-2/3"></div></div>
        <div class="card p-5"><div class="sk h-3 w-20 mb-2"></div><div class="sk h-6 w-full mb-1"></div><div class="sk h-6 w-2/3"></div></div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <!-- 3 个原 page module 都会 mount 各自容器, 顶部 segmented control 用 hash 切显示 -->
  <script type="module" src="/js/pages/schedule.js"></script>
  <script type="module" src="/js/pages/standings.js"></script>
  <script type="module" src="/js/pages/results.js"></script>
  <script type="module" src="/js/pages/matches.js"></script>
</body>
</html>
