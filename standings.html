<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-attr="title:meta.standings.title">积分榜 · WC 2026 · AI 预测</title>
  <meta name="description" data-i18n-attr="content:meta.standings.description" content="2026 世界杯 12 个小组积分榜 + 8 个最佳第 3 名晋级榜。" />
  <meta name="theme-color" content="#0B1F3A" />
  <meta property="og:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1" data-i18n="standings.kicker">Standings</div>
      <h1 class="text-3xl sm:text-4xl font-black" data-i18n="standings.title">积分榜</h1>
      <p class="text-slate-500 text-sm mt-2" data-i18n="standings.subtitle">12 组，每组前 2 + 8 个成绩最佳的第 3 名晋级 32 强淘汰赛</p>
    </div>

    <div class="card p-3 mb-6 overflow-x-auto scrollbar-thin">
      <div id="group-tabs" class="flex gap-1 min-w-max" aria-busy="true">
        <div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div><div class="sk h-8 w-16"></div>
      </div>
    </div>

    <div id="standings-table" aria-busy="true">
      <div class="card p-8"><div class="sk h-4 w-1/3 mb-3"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-3/4"></div></div>
    </div>

    <div class="mt-10">
      <h2 class="text-xl font-bold mb-3" data-i18n="standings.thirds.title">8 个最佳第 3 名</h2>
      <p class="text-xs text-slate-500 mb-3" data-i18n="standings.thirds.subtitle">FIFA 规则：积分 → 净胜球 → 进球 → 公平竞赛分</p>
      <div id="third-place-table" aria-busy="true">
        <div class="card p-8"><div class="sk h-4 w-1/2 mb-3"></div><div class="sk h-4 w-full mb-2"></div></div>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/standings.js"></script>
</body>
</html>
