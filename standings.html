<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>积分榜 · WC 2026 · AI 预测</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Standings</div>
      <h1 class="text-3xl sm:text-4xl font-black">积分榜</h1>
      <p class="text-slate-500 text-sm mt-2">12 组，每组前 2 + 8 个成绩最佳的第 3 名晋级 32 强淘汰赛</p>
    </div>

    <div class="card p-3 mb-6 overflow-x-auto scrollbar-thin">
      <div id="group-tabs" class="flex gap-1 min-w-max"></div>
    </div>

    <div id="standings-table"></div>

    <div class="mt-10">
      <h2 class="text-xl font-bold mb-3">8 个最佳第 3 名</h2>
      <p class="text-xs text-slate-500 mb-3">FIFA 规则：积分 → 净胜球 → 进球 → 公平竞赛分</p>
      <div id="third-place-table"></div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getMatches, getResults, getTeams, getGroups } from '/js/data.js';
    import { teamChip } from '/js/util.js';

    const [matches, results, teams, groups] = await Promise.all([
      getMatches(), getResults(), getTeams(), getGroups(),
    ]);
    const resultMap = new Map(results.map((r) => [r.matchId, r]));
    const teamMap = new Map(teams.map((t) => [t.code, t]));

    // 算每组积分榜
    function computeStandings(groupId) {
      const group = groups.find((g) => g.id === groupId);
      if (!group) return [];
      const table = group.teams.map((code) => ({
        code,
        team: teamMap.get(code),
        played: 0, win: 0, draw: 0, lose: 0, gf: 0, ga: 0, pts: 0,
        status: 'pool',
      }));
      const idx = new Map(table.map((t, i) => [t.code, i]));
      const groupMatches = matches.filter((m) => m.group === groupId);
      for (const m of groupMatches) {
        const r = resultMap.get(m.id);
        if (!r) continue;
        const hi = idx.get(m.home);
        const ai = idx.get(m.away);
        if (hi == null || ai == null) continue;
        table[hi].played += 1;
        table[ai].played += 1;
        table[hi].gf += r.homeScore;
        table[hi].ga += r.awayScore;
        table[ai].gf += r.awayScore;
        table[ai].ga += r.homeScore;
        if (r.homeScore > r.awayScore) {
          table[hi].win += 1; table[hi].pts += 3;
          table[ai].lose += 1;
        } else if (r.homeScore < r.awayScore) {
          table[ai].win += 1; table[ai].pts += 3;
          table[hi].lose += 1;
        } else {
          table[hi].draw += 1; table[ai].draw += 1;
          table[hi].pts += 1; table[ai].pts += 1;
        }
      }
      table.forEach((t) => { t.gd = t.gf - t.ga; });
      table.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      table.forEach((t, i) => {
        if (i < 2) t.status = 'qualify';
        else t.status = 'maybe';
      });
      return table;
    }

    // 算所有组的"第 3 名"
    function computeBestThirds() {
      const thirds = [];
      for (const g of groups) {
        const table = computeStandings(g.id);
        if (table.length >= 3 && table[2].played > 0) {
          thirds.push({ group: g.id, ...table[2] });
        }
      }
      thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      return thirds;
    }

    let activeGroup = 'A';

    function renderTabs() {
      const el = document.getElementById('group-tabs');
      el.innerHTML = groups.map((g) => `
        <button data-id="${g.id}" class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${g.id === activeGroup ? 'bg-ink text-white' : 'text-slate-600 hover:bg-slate-100'}">${g.name}</button>
      `).join('');
      el.querySelectorAll('button').forEach((b) => {
        b.addEventListener('click', () => {
          activeGroup = b.dataset.id;
          renderTabs();
          renderTable();
        });
      });
    }

    function renderTable() {
      const table = computeStandings(activeGroup);
      const el = document.getElementById('standings-table');
      const hasData = table.some((t) => t.played > 0);
      if (!hasData) {
        el.innerHTML = `<div class="card p-8 text-center text-slate-500">该小组暂无已结束比赛</div>`;
        return;
      }
      el.innerHTML = `
        <div class="card overflow-hidden">
          <div class="overflow-x-auto scrollbar-thin">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                <tr>
                  <th class="px-3 py-3 text-left">#</th>
                  <th class="px-3 py-3 text-left">球队</th>
                  <th class="px-2 py-3 text-center" title="已赛场次">场</th>
                  <th class="px-2 py-3 text-center" title="胜">胜</th>
                  <th class="px-2 py-3 text-center" title="平">平</th>
                  <th class="px-2 py-3 text-center" title="负">负</th>
                  <th class="px-2 py-3 text-center" title="进球">进</th>
                  <th class="px-2 py-3 text-center" title="失球">失</th>
                  <th class="px-2 py-3 text-center" title="净胜球">净</th>
                  <th class="px-3 py-3 text-center font-bold">积分</th>
                  <th class="px-3 py-3 text-left">状态</th>
                </tr>
              </thead>
              <tbody>
                ${table.map((t, i) => `
                  <tr class="border-t border-slate-100 ${t.status === 'qualify' ? 'bg-pitch/5' : ''}">
                    <td class="px-3 py-3 text-slate-400 font-semibold">${i + 1}</td>
                    <td class="px-3 py-3">
                      <div class="flex items-center gap-2">
                        ${teamChip(t.team, 'sm')}
                        <span class="font-semibold">${t.team?.name || t.code}</span>
                      </div>
                    </td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.played}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.win}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.draw}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.lose}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.gf}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.ga}</td>
                    <td class="px-2 py-3 text-center tabular-nums font-semibold ${t.gd > 0 ? 'text-pitch' : t.gd < 0 ? 'text-flame' : ''}">${t.gd > 0 ? '+' : ''}${t.gd}</td>
                    <td class="px-3 py-3 text-center font-black text-lg tabular-nums">${t.pts}</td>
                    <td class="px-3 py-3">
                      ${t.status === 'qualify' ? '<span class="badge badge-pitch">晋级</span>' : ''}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderBestThirds() {
      const thirds = computeBestThirds();
      const el = document.getElementById('third-place-table');
      if (thirds.length === 0) {
        el.innerHTML = '<div class="card p-6 text-center text-slate-500 text-sm">需要更多比赛结束后才能计算</div>';
        return;
      }
      el.innerHTML = `
        <div class="card overflow-hidden">
          <div class="overflow-x-auto scrollbar-thin">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                <tr>
                  <th class="px-3 py-3 text-left">#</th>
                  <th class="px-3 py-3 text-left">组</th>
                  <th class="px-3 py-3 text-left">球队</th>
                  <th class="px-2 py-3 text-center">场</th>
                  <th class="px-2 py-3 text-center">进</th>
                  <th class="px-2 py-3 text-center">失</th>
                  <th class="px-2 py-3 text-center">净</th>
                  <th class="px-3 py-3 text-center">积分</th>
                  <th class="px-3 py-3 text-left">状态</th>
                </tr>
              </thead>
              <tbody>
                ${thirds.map((t, i) => `
                  <tr class="border-t border-slate-100 ${i < 8 ? 'bg-pitch/5' : ''}">
                    <td class="px-3 py-3 text-slate-400 font-semibold">${i + 1}</td>
                    <td class="px-3 py-3 font-semibold">${t.group}</td>
                    <td class="px-3 py-3">
                      <div class="flex items-center gap-2">
                        ${teamChip(t.team, 'sm')}
                        <span class="font-semibold">${t.team?.name || t.code}</span>
                      </div>
                    </td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.played}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.gf}</td>
                    <td class="px-2 py-3 text-center tabular-nums">${t.ga}</td>
                    <td class="px-2 py-3 text-center tabular-nums font-semibold ${t.gd > 0 ? 'text-pitch' : t.gd < 0 ? 'text-flame' : ''}">${t.gd > 0 ? '+' : ''}${t.gd}</td>
                    <td class="px-3 py-3 text-center font-black tabular-nums">${t.pts}</td>
                    <td class="px-3 py-3">
                      ${i < 8 ? '<span class="badge badge-pitch">晋级</span>' : '<span class="badge badge-slate">出局</span>'}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    renderTabs();
    renderTable();
    renderBestThirds();
  </script>
</body>
</html>
