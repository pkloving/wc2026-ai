<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完整赛程 · WC 2026 · AI 预测</title>
  <meta name="description" content="2026 世界杯全部 104 场比赛，支持按日期/小组/阶段/状态筛选。" />
  <meta name="theme-color" content="#0B1F3A" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Schedule</div>
      <h1 class="text-3xl sm:text-4xl font-black">完整赛程</h1>
      <p class="text-slate-500 text-sm mt-2">共 104 场 · 小组赛 72 + 淘汰赛 32</p>
    </div>

    <!-- 筛选器 -->
    <div class="card p-4 mb-6">
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">阶段</label>
          <select id="f-stage" class="input">
            <option value="">全部</option>
            <option value="group">小组赛</option>
            <option value="r32">32 强</option>
            <option value="r16">16 强</option>
            <option value="qf">8 强</option>
            <option value="sf">半决赛</option>
            <option value="third">三四名</option>
            <option value="final">决赛</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">小组</label>
          <select id="f-group" class="input">
            <option value="">全部</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
            <option value="D">D</option><option value="E">E</option><option value="F">F</option>
            <option value="G">G</option><option value="H">H</option><option value="I">I</option>
            <option value="J">J</option><option value="K">K</option><option value="L">L</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">状态</label>
          <select id="f-status" class="input">
            <option value="">全部</option>
            <option value="finished">已结束</option>
            <option value="scheduled">未开赛</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">球队 (3 字母代码)</label>
          <input id="f-team" class="input" placeholder="如 ARG / BRA" />
        </div>
      </div>
      <div class="mt-3 flex items-center justify-between text-xs text-slate-500">
        <span id="f-count">—</span>
        <button id="f-reset" class="text-ink hover:text-gold">重置</button>
      </div>
    </div>

    <div id="schedule-list" aria-busy="true">
      <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
      <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
      <div class="card p-4 mb-3"><div class="sk h-3 w-16 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/schedule.js"></script>
</body>
</html>
