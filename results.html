<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>比赛结果 · WC 2026 · AI 预测</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Results</div>
      <h1 class="text-3xl sm:text-4xl font-black">比赛结果</h1>
      <p class="text-slate-500 text-sm mt-2">已结束比赛 · 按时间倒序 · 点击进入 AI 预测复盘</p>
    </div>

    <div id="results-list" class="grid lg:grid-cols-2 gap-4"></div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getMatches, getResults, getTeams, getPredictions } from '/js/data.js';
    import { fmtDate, STAGE_LABEL, teamChip, hitBadge } from '/js/util.js';

    const [matches, results, teams, predictions] = await Promise.all([
      getMatches(), getResults(), getTeams(), getPredictions(),
    ]);
    const teamMap = new Map(teams.map((t) => [t.code, t]));
    const predMap = new Map(predictions.map((p) => [p.matchId, p]));

    const list = results
      .map((r) => {
        const m = matches.find((x) => x.id === r.matchId);
        return m ? { match: m, result: r, prediction: predMap.get(m.id) } : null;
      })
      .filter(Boolean)
      .sort((a, b) => new Date(b.match.date) - new Date(a.match.date));

    const el = document.getElementById('results-list');
    if (list.length === 0) {
      el.innerHTML = '<div class="col-span-full text-slate-500 text-sm">暂无已结束比赛，比赛开始后将自动展示</div>';
    } else {
      el.innerHTML = list.map(({ match, result, prediction }) => {
        const home = teamMap.get(match.home);
        const away = teamMap.get(match.away);
        const stageBadge = match.stage === 'group'
          ? `<span class="badge badge-ink">${match.group} 组</span>`
          : `<span class="badge badge-gold">${STAGE_LABEL[match.stage] || match.stage}</span>`;
        const d = fmtDate(match.date);
        const scorersHtml = result.scorers && result.scorers.length > 0
          ? `<div class="mt-3 text-xs text-slate-600 space-y-1">${result.scorers.map((s) => `<div class="flex items-center gap-2"><span class="font-mono text-slate-400">${s.minute}'</span><span class="font-semibold">${s.player}</span>${s.type === 'penalty' ? '<span class="badge badge-gold">点球</span>' : ''}${s.type === 'og' ? '<span class="badge badge-flame">乌龙</span>' : ''}</div>`).join('')}</div>`
          : '';
        const pensHtml = result.wentToPenalties ? `<div class="mt-2 text-xs text-flame font-semibold">点球大战：${result.penaltyScore.home} - ${result.penaltyScore.away}</div>` : '';
        const predChips = prediction ? prediction.models.slice(0, 4).map((mm) => {
          const ph = mm.predictedHome, pa = mm.predictedAway;
          let tone = 'badge-slate';
          if (ph === result.homeScore && pa === result.awayScore) tone = 'badge-pitch';
          else {
            const pw = ph > pa ? 'home' : ph < pa ? 'away' : 'draw';
            const rw = result.homeScore > result.awayScore ? 'home' : result.homeScore < result.awayScore ? 'away' : 'draw';
            if (pw === rw) tone = 'badge-gold';
          }
          return `<span class="badge ${tone}">${mm.model.split(' ')[0]} ${ph}-${pa}</span>`;
        }).join(' ') : '';
        return `
          <a href="/match.html?id=${match.id}" class="card p-5 hover:-translate-y-0.5 transition-transform block">
            <div class="flex items-center gap-2 text-xs mb-3">
              ${stageBadge}
              <span class="text-slate-500">${d.date} ${d.time}</span>
            </div>
            <div class="grid grid-cols-[1fr_auto_1fr] gap-3 items-center">
              <div class="flex items-center gap-2 min-w-0">
                ${teamChip(home, 'md')}
                <div class="min-w-0">
                  <div class="font-bold truncate">${home?.name || match.home}</div>
                </div>
              </div>
              <div class="text-3xl font-black tabular-nums px-3">${result.homeScore} - ${result.awayScore}</div>
              <div class="flex items-center gap-2 min-w-0 justify-end">
                <div class="min-w-0 text-right">
                  <div class="font-bold truncate">${away?.name || match.away}</div>
                </div>
                ${teamChip(away, 'md')}
              </div>
            </div>
            ${scorersHtml}
            ${pensHtml}
            ${predChips ? `<div class="mt-3 flex flex-wrap gap-1.5 text-xs">${predChips}</div>` : ''}
            <div class="mt-3 text-xs text-slate-400 truncate">${match.venue || ''}</div>
          </a>
        `;
      }).join('');
    }
  </script>
</body>
</html>
