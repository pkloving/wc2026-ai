<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-attr="title:meta.results.title">比赛结果 · WC 2026 · AI 预测</title>
  <meta name="description" data-i18n-attr="content:meta.results.description" content="2026 世界杯已结束比赛的比分 + AI 预测复盘，按时间倒序。" />
  <meta name="theme-color" content="#0B1F3A" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1" data-i18n="results.kicker">Results</div>
      <h1 class="text-3xl sm:text-4xl font-black" data-i18n="results.title">比赛结果</h1>
      <p class="text-slate-500 text-sm mt-2" data-i18n="results.subtitle">已结束比赛 · 按时间倒序 · 点击进入 AI 预测复盘</p>
    </div>

    <div id="results-list" class="grid lg:grid-cols-2 gap-4" aria-busy="true">
      <div class="card p-5"><div class="sk h-3 w-20 mb-2"></div><div class="sk h-6 w-full mb-1"></div><div class="sk h-6 w-2/3"></div></div>
      <div class="card p-5"><div class="sk h-3 w-20 mb-2"></div><div class="sk h-6 w-full mb-1"></div><div class="sk h-6 w-2/3"></div></div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/results.js"></script>
</body>
</html>
