<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-attr="title:meta.match.title">比赛详情 · WC 2026 · AI 预测</title>
  <meta name="description" data-i18n-attr="content:meta.match.description" content="单场比赛详情：实际比分 + 每个 AI 大模型的预测比分。" />
  <meta name="theme-color" content="#0B1F3A" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <a href="/predictions.html" class="text-sm text-ink hover:text-gold" data-i18n="common.backToPredictions">← 返回 AI 预测总览</a>
    <div id="match-header" class="mt-4 mb-8" aria-busy="true">
      <div class="card p-6 sm:p-8"><div class="grid grid-cols-[1fr_auto_1fr] gap-4 sm:gap-6 items-center"><div class="flex flex-col items-center"><div class="sk w-16 h-16 rounded-full"></div><div class="sk h-4 w-20 mt-3"></div></div><div class="sk h-10 w-20"></div><div class="flex flex-col items-center"><div class="sk w-16 h-16 rounded-full"></div><div class="sk h-4 w-20 mt-3"></div></div></div></div>
    </div>
    <div id="match-result" class="mb-10"></div>
    <h2 class="text-2xl font-bold mb-4">🤖 <span data-i18n="match.aiPredictionsHeading">AI 大模型预测</span> <span class="text-sm font-normal text-slate-500" id="model-count"></span></h2>
    <div id="model-list" class="space-y-6" aria-busy="true">
      <div class="card p-5 sm:p-6"><div class="sk h-5 w-1/3 mb-3"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-2/3"></div></div>
      <div class="card p-5 sm:p-6"><div class="sk h-5 w-1/3 mb-3"></div><div class="sk h-4 w-full mb-2"></div><div class="sk h-4 w-2/3"></div></div>
    </div>
  </main>
  <div id="app-footer"></div>

  <!-- 灯箱 -->
  <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/80 items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
    <img id="lightbox-img" class="max-w-full max-h-full rounded-lg shadow-2xl" alt="" />
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/match.js"></script>
</body>
</html>
