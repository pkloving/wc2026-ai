<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统计 · WC 2026 · AI 预测</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Stats</div>
      <h1 class="text-3xl sm:text-4xl font-black">统计 & 准确率</h1>
      <p class="text-slate-500 text-sm mt-2">所有数据随比赛进行自动更新</p>
    </div>

    <!-- 速览 -->
    <section class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-10">
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">已结束比赛</div>
        <div class="text-3xl font-black mt-1" id="stat-finished">0</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">有 AI 预测的场次</div>
        <div class="text-3xl font-black mt-1 text-gold" id="stat-predicted">0</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">累计 AI 预测条目</div>
        <div class="text-3xl font-black mt-1" id="stat-total-preds">0</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">综合胜负命中率</div>
        <div class="text-3xl font-black mt-1 text-pitch" id="stat-overall">0%</div>
      </div>
    </section>

    <!-- AI 模型准确率榜 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🤖 AI 模型准确率榜</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 360px;">
          <canvas id="chart-accuracy"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">蓝色 = 比分完全一致；金色 = 胜负方向一致（比分不要求一致）</p>
      </div>
    </section>

    <!-- 各阶段准确率 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🎯 各阶段准确率</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 280px;">
          <canvas id="chart-stages"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">小组赛 / 32 强 / 16 强 / 8 强 / 半决赛 / 决赛 各自的命中率</p>
      </div>
    </section>

    <!-- 进展时间线 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">📈 命中率随比赛进展</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 320px;">
          <canvas id="chart-timeline"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">每场比赛结束后，累计命中率的变化</p>
      </div>
    </section>

    <!-- 关键比赛 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🏆 关键比赛预测回顾</h2>
      <div id="key-matches" class="grid lg:grid-cols-2 gap-4"></div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getMatches, getResults, getTeams, getPredictions } from '/js/data.js';
    import { STAGE_LABEL, hitBadge, teamChip } from '/js/util.js';
    import { Chart, registerables } from 'chart.js';

    Chart.register(...registerables);

    const [matches, results, teams, predictions] = await Promise.all([
      getMatches(), getResults(), getTeams(), getPredictions(),
    ]);
    const resultMap = new Map(results.map((r) => [r.matchId, r]));
    const teamMap = new Map(teams.map((t) => [t.code, t]));

    // 速览
    const finished = results.length;
    const predictedMatchIds = new Set(predictions.map((p) => p.matchId));
    const finishedPredicted = [...predictedMatchIds].filter((id) => resultMap.has(id));
    let totalPreds = 0, totalWinner = 0;
    for (const p of predictions) {
      const r = resultMap.get(p.matchId);
      if (!r) continue;
      for (const m of p.models) {
        totalPreds += 1;
        const ph = m.predictedHome, pa = m.predictedAway;
        if (ph === r.homeScore && pa === r.awayScore) {
          totalWinner += 1; // 比分一致也算胜负一致
        } else {
          const pw = ph > pa ? 'home' : ph < pa ? 'away' : 'draw';
          const rw = r.homeScore > r.awayScore ? 'home' : r.homeScore < r.awayScore ? 'away' : 'draw';
          if (pw === rw) totalWinner += 1;
        }
      }
    }
    document.getElementById('stat-finished').textContent = finished;
    document.getElementById('stat-predicted').textContent = predictions.length;
    document.getElementById('stat-total-preds').textContent = totalPreds;
    document.getElementById('stat-overall').textContent = totalPreds > 0
      ? Math.round((totalWinner / totalPreds) * 100) + '%' : '—';

    // 1. AI 模型准确率榜
    const modelStats = new Map();
    for (const p of predictions) {
      const r = resultMap.get(p.matchId);
      for (const m of p.models) {
        if (!modelStats.has(m.model)) modelStats.set(m.model, { scoreHit: 0, winnerHit: 0, total: 0, finished: 0 });
        const s = modelStats.get(m.model);
        s.total += 1;
        if (!r) continue;
        s.finished += 1;
        const ph = m.predictedHome, pa = m.predictedAway;
        if (ph === r.homeScore && pa === r.awayScore) { s.scoreHit += 1; s.winnerHit += 1; }
        else {
          const pw = ph > pa ? 'home' : ph < pa ? 'away' : 'draw';
          const rw = r.homeScore > r.awayScore ? 'home' : r.homeScore < r.awayScore ? 'away' : 'draw';
          if (pw === rw) s.winnerHit += 1;
        }
      }
    }
    const labels = [...modelStats.keys()];
    const scorePct = labels.map((k) => {
      const s = modelStats.get(k);
      return s.finished > 0 ? Math.round((s.scoreHit / s.finished) * 100) : 0;
    });
    const winnerPct = labels.map((k) => {
      const s = modelStats.get(k);
      return s.finished > 0 ? Math.round((s.winnerHit / s.finished) * 100) : 0;
    });
    new Chart(document.getElementById('chart-accuracy'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '比分命中 %', data: scorePct, backgroundColor: '#0E7C3A' },
          { label: '胜负命中 %', data: winnerPct, backgroundColor: '#D4AF37' },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: (v) => v + '%' } } },
        plugins: {
          legend: { position: 'top' },
          tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${c.parsed.y}%（${modelStats.get(c.label).scoreHit}/${modelStats.get(c.label).finished}）` } },
        },
      },
    });

    // 2. 各阶段准确率
    const stages = ['group', 'r32', 'r16', 'qf', 'sf', 'final'];
    const stageStats = new Map(stages.map((s) => [s, { score: 0, winner: 0, total: 0 }]));
    for (const p of predictions) {
      const m = matches.find((x) => x.id === p.matchId);
      const r = resultMap.get(p.matchId);
      if (!m || !r) continue;
      const s = stageStats.get(m.stage);
      if (!s) continue;
      for (const mm of p.models) {
        s.total += 1;
        const ph = mm.predictedHome, pa = mm.predictedAway;
        if (ph === r.homeScore && pa === r.awayScore) { s.score += 1; s.winner += 1; }
        else {
          const pw = ph > pa ? 'home' : ph < pa ? 'away' : 'draw';
          const rw = r.homeScore > r.awayScore ? 'home' : r.homeScore < r.awayScore ? 'away' : 'draw';
          if (pw === rw) s.winner += 1;
        }
      }
    }
    new Chart(document.getElementById('chart-stages'), {
      type: 'bar',
      data: {
        labels: stages.map((s) => STAGE_LABEL[s] || s),
        datasets: [
          { label: '比分命中 %', data: stages.map((s) => stageStats.get(s).total ? Math.round((stageStats.get(s).score / stageStats.get(s).total) * 100) : 0), backgroundColor: '#0E7C3A' },
          { label: '胜负命中 %', data: stages.map((s) => stageStats.get(s).total ? Math.round((stageStats.get(s).winner / stageStats.get(s).total) * 100) : 0), backgroundColor: '#D4AF37' },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: (v) => v + '%' } } },
        plugins: { legend: { position: 'top' } },
      },
    });

    // 3. 进展时间线
    const sorted = matches.filter((m) => resultMap.has(m.id)).sort((a, b) => new Date(a.date) - new Date(b.date));
    const cumStats = new Map();
    for (const m of sorted) {
      const p = predictions.find((x) => x.matchId === m.id);
      if (!p) continue;
      const r = resultMap.get(m.id);
      for (const mm of p.models) {
        if (!cumStats.has(mm.model)) cumStats.set(mm.model, { x: [], y: [], score: 0, winner: 0, total: 0 });
        const cs = cumStats.get(mm.model);
        const ph = mm.predictedHome, pa = mm.predictedAway;
        cs.total += 1;
        if (ph === r.homeScore && pa === r.awayScore) { cs.score += 1; cs.winner += 1; }
        else {
          const pw = ph > pa ? 'home' : ph < pa ? 'away' : 'draw';
          const rw = r.homeScore > r.awayScore ? 'home' : r.homeScore < r.awayScore ? 'away' : 'draw';
          if (pw === rw) cs.winner += 1;
        }
        cs.x.push(new Date(m.date).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }));
        cs.y.push(Math.round((cs.winner / cs.total) * 100));
      }
    }
    const palette = ['#0E7C3A', '#D4AF37', '#E63946', '#0B1F3A', '#888888', '#FF6F00', '#1976D2'];
    new Chart(document.getElementById('chart-timeline'), {
      type: 'line',
      data: {
        datasets: [...cumStats.entries()].map(([model, s], i) => ({
          label: `${model}（胜负%）`,
          data: s.x.map((x, j) => ({ x, y: s.y[j] })),
          borderColor: palette[i % palette.length],
          backgroundColor: palette[i % palette.length] + '20',
          tension: 0.2,
          fill: false,
        })),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: (v) => v + '%' } } },
        plugins: { legend: { position: 'top' } },
      },
    });

    // 4. 关键比赛回顾
    const keyStages = ['sf', 'third', 'final'];
    const keyList = sorted.filter((m) => keyStages.includes(m.stage));
    const el = document.getElementById('key-matches');
    if (keyList.length === 0) {
      el.innerHTML = '<div class="col-span-full text-slate-500 text-sm">关键比赛（半决赛 / 三四名 / 决赛）开始后自动展示</div>';
    } else {
      el.innerHTML = keyList.map((m) => {
        const r = resultMap.get(m.id);
        const p = predictions.find((x) => x.matchId === m.id);
        const home = teamMap.get(m.home);
        const away = teamMap.get(m.away);
        const chips = p ? p.models.map((mm) => {
          const b = hitBadge(r, mm);
          return `<span class="badge ${b.tone}">${mm.model.split(' ')[0]} ${mm.predictedHome}-${mm.predictedAway}</span>`;
        }).join(' ') : '';
        return `
          <a href="/match.html?id=${m.id}" class="card p-5 hover:-translate-y-0.5 transition-transform block">
            <div class="text-xs text-slate-500 mb-2">${STAGE_LABEL[m.stage] || m.stage}</div>
            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-2 min-w-0">
                ${teamChip(home, 'sm')}
                <div class="font-semibold truncate">${home?.name || m.home}</div>
              </div>
              <div class="text-2xl font-black tabular-nums">${r.homeScore} - ${r.awayScore}</div>
              <div class="flex items-center gap-2 min-w-0">
                <div class="font-semibold truncate">${away?.name || m.away}</div>
                ${teamChip(away, 'sm')}
              </div>
            </div>
            ${chips ? `<div class="mt-3 flex flex-wrap gap-1.5 text-xs">${chips}</div>` : ''}
          </a>
        `;
      }).join('');
    }
  </script>
</body>
</html>
