<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统计 · WC 2026 · AI 预测</title>
  <meta name="description" content="AI 大模型在 2026 世界杯各阶段命中率统计 + 趋势图。" />
  <meta name="theme-color" content="#0B1F3A" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="mb-6">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1">Stats</div>
      <h1 class="text-3xl sm:text-4xl font-black">统计 & 准确率</h1>
      <p class="text-slate-500 text-sm mt-2">所有数据随比赛进行自动更新</p>
    </div>

    <!-- 速览 -->
    <section class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-10">
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">已结束比赛</div>
        <div class="text-3xl font-black mt-1" id="stat-finished" aria-busy="true">—</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">有 AI 预测的场次</div>
        <div class="text-3xl font-black mt-1 text-gold" id="stat-predicted" aria-busy="true">—</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">累计 AI 预测条目</div>
        <div class="text-3xl font-black mt-1" id="stat-total-preds" aria-busy="true">—</div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-500 uppercase">综合胜负命中率</div>
        <div class="text-3xl font-black mt-1 text-pitch" id="stat-overall" aria-busy="true">—</div>
      </div>
    </section>

    <!-- AI 模型准确率榜 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🤖 AI 模型准确率榜</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 360px;">
          <canvas id="chart-accuracy"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">蓝色 = 比分完全一致；金色 = 胜负方向一致（比分不要求一致）</p>
      </div>
    </section>

    <!-- 各阶段准确率 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🎯 各阶段准确率</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 280px;">
          <canvas id="chart-stages"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">小组赛 / 32 强 / 16 强 / 8 强 / 半决赛 / 决赛 各自的命中率</p>
      </div>
    </section>

    <!-- 进展时间线 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">📈 命中率随比赛进展</h2>
      <div class="card p-4 sm:p-6">
        <div class="relative" style="height: 320px;">
          <canvas id="chart-timeline"></canvas>
        </div>
        <p class="text-xs text-slate-500 mt-3">每场比赛结束后，累计命中率的变化</p>
      </div>
    </section>

    <!-- 关键比赛 -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">🏆 关键比赛预测回顾</h2>
      <div id="key-matches" class="grid lg:grid-cols-2 gap-4" aria-busy="true">
        <div class="card p-5"><div class="sk h-3 w-1/3 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
        <div class="card p-5"><div class="sk h-3 w-1/3 mb-3"></div><div class="sk h-5 w-full mb-2"></div><div class="sk h-5 w-3/4"></div></div>
      </div>
    </section>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/stats.js"></script>
</body>
</html>
