<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-attr="title:meta.contact.title">联系 · WC 2026 · AI 预测</title>
  <meta name="description" data-i18n-attr="content:meta.contact.description" content="给站长留言：建议、bug、AI 大模型押比赛讨论。" />
  <meta name="theme-color" content="#0B1F3A" />
  <meta property="og:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.wc2026-ai.top/og-cover.png" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://flagcdn.com" />
  <style>
    html,body{margin:0;padding:0;background:#f8fafc;color:#0B1F3A;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;min-height:100vh}
    .sk{position:relative;overflow:hidden;background:rgba(15,23,42,.08);border-radius:.5rem}
    .sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(15,23,42,.12),transparent);animation:sk 1.4s infinite}
    @keyframes sk{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  </style>
  <!-- Vercel Web Analytics（无 cookie / 无 PII） -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>
  <main class="flex-1 container-page py-8">
    <div class="max-w-3xl">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-1" data-i18n="contact.kicker">Contact</div>
      <h1 class="text-3xl sm:text-4xl font-black mb-2" data-i18n="contact.title">📬 联系我</h1>
      <p class="text-slate-600 mb-8" data-i18n="contact.subtitle">对站点有建议、发现了 bug、想聊 AI 大模型押比赛，或者单纯想说点什么 —— 欢迎留言。我会看到每一封。</p>

      <form id="contact-form" class="card p-6 sm:p-8 mb-6" novalidate>
        <div class="mb-4">
          <label for="contact-name" class="block text-sm font-semibold text-slate-700 mb-1">
            <span data-i18n="contact.form.name">姓名</span> <span class="text-flame" aria-hidden="true">*</span>
          </label>
          <input id="contact-name" name="name" type="text" required maxlength="80" autocomplete="name"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition"
            data-i18n-attr="placeholder:contact.form.namePlaceholder" />
          <p id="contact-name-error" class="hidden text-xs text-flame mt-1" role="alert"></p>
        </div>

        <div class="mb-4">
          <label for="contact-email" class="block text-sm font-semibold text-slate-700 mb-1">
            <span data-i18n="contact.form.email">邮箱</span> <span class="text-flame" aria-hidden="true">*</span>
          </label>
          <input id="contact-email" name="email" type="email" required maxlength="120" autocomplete="email" inputmode="email"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition"
            data-i18n-attr="placeholder:contact.form.emailPlaceholder" />
          <p id="contact-email-error" class="hidden text-xs text-flame mt-1" role="alert"></p>
        </div>

        <div class="mb-5">
          <label for="contact-message" class="block text-sm font-semibold text-slate-700 mb-1">
            <span data-i18n="contact.form.message">留言</span> <span class="text-flame" aria-hidden="true">*</span>
          </label>
          <textarea id="contact-message" name="message" required maxlength="2000" rows="6"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition resize-y"
            data-i18n-attr="placeholder:contact.form.messagePlaceholder"></textarea>
          <p id="contact-message-error" class="hidden text-xs text-flame mt-1" role="alert"></p>
          <p class="text-xs text-slate-400 mt-1" data-i18n="contact.form.messageHint">至少 10 字 · 不超过 2000 字</p>
        </div>

        <!-- 蜜罐字段：真人不会填，机器人会填，填了就静默丢弃 -->
        <input type="text" name="_gotcha" class="hidden" tabindex="-1" autocomplete="off" aria-hidden="true" value="" />

        <button id="contact-submit" type="submit"
          class="w-full sm:w-auto px-6 py-3 bg-ink text-white font-bold rounded-lg hover:bg-night transition disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
          <span data-i18n="contact.form.submit">发送</span>
        </button>

        <div id="contact-status" class="hidden mt-4 p-4 rounded-lg text-sm" role="status" aria-live="polite"></div>
      </form>

      <div class="card p-5 text-sm text-slate-600 leading-relaxed">
        <p data-i18n-html="contact.privacy.body"><b>隐私：</b>留言会通过 Formspree 转发到我的邮箱，不会在本站留底，不会用于营销，不会分享给任何第三方。</p>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/pages/contact.js"></script>
</body>
</html>
